name: Video Transcoder
on:
  repository_dispatch:
    types: [start_transcode]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install FFmpeg & B2 CLI
        run: |
          sudo apt-get install -y ffmpeg
          pip install --upgrade b2

      - name: Download & Transcode
        env:
          B2_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          RAW_BUCKET: ${{ secrets.B2_PRIVATE_RAW_BUCKET }}
        run: |
          b2 authorize-account $B2_KEY_ID $B2_KEY
          
          # Use the payload sent from your Node.js server
          VIDEO_ID="${{ github.event.client_payload.videoId }}"
          FILENAME="${{ github.event.client_payload.filename }}"
          
          # Download the specific file
          b2 download-file-by-name $RAW_BUCKET "$VIDEO_ID-$FILENAME" input.mp4
          
          # Create HLS directory structure
          mkdir -p output/v0 output/v1 output/v2
          
          # Transcode
          ffmpeg -i input.mp4 \
          -map 0:v -map 0:a -s:v:0 1920x1080 -b:v:0 5000k \
          -map 0:v -map 0:a -s:v:1 1280x720  -b:v:1 2800k \
          -map 0:v -map 0:a -s:v:2 640x360   -b:v:2 800k \
          -var_stream_map "v:0,a:0 v:1,a:1 v:2,a:2" \
          -master_pl_name master.m3u8 \
          -f hls -hls_time 10 -hls_list_size 0 \
          -hls_segment_filename "output/v%v/file%03d.ts" output/v%v/index.m3u8

      - name: Upload to Private Output Bucket
        env:
          B2_KEY_ID: ${{ secrets.B2_APPLICATION_KEY_ID }}
          B2_KEY: ${{ secrets.B2_APPLICATION_KEY }}
          OUTPUT_BUCKET: ${{ secrets.B2_PRIVATE_OUTPUT_BUCKET }}
        run: |
          # Sync the entire output folder to the private stream bucket
          b2 sync output/ b2://$OUTPUT_BUCKET/videos/${{ github.event.client_payload.videoId }}/

      - name: Notify Backend
        run: |
          # Callback to your local machine via ngrok
          curl -X GET "${{ secrets.NGROK_URL }}/api/v1/updateVideoStatus?id=${{ github.event.client_payload.videoId }}&status=ready"